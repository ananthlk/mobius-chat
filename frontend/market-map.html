<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FL BH Market Map — Mobius</title>
<link rel="icon" href="static/logo.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="static/org-story.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  .mm-wrap { display: flex; flex-direction: column; height: calc(100vh - 50px); }
  .mm-map { flex: 1; min-height: 0; }
  .mm-sidebar { position: absolute; top: 60px; right: 12px; width: 320px; max-height: calc(100vh - 80px);
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    z-index: 500; overflow-y: auto; display: none; }
  .mm-sidebar.open { display: block; }
  .mm-sidebar-header { display: flex; justify-content: space-between; align-items: center;
    padding: .75rem 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg2); }
  .mm-sidebar-header h3 { font-size: .85rem; color: var(--accent); margin: 0; }
  .mm-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1.2rem; }
  .mm-sidebar-body { padding: .75rem 1rem; }
  .mm-stat { display: flex; justify-content: space-between; padding: .3rem 0; font-size: .8rem;
    border-bottom: 1px solid rgba(42,45,62,.4); }
  .mm-stat:last-child { border: none; }
  .mm-stat-label { color: var(--text3); }
  .mm-stat-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .mm-nav-btn { display: block; width: 100%; margin-top: .75rem; padding: .5rem; background: var(--accent);
    color: #fff; border: none; border-radius: 6px; font-weight: 600; font-size: .85rem;
    cursor: pointer; text-align: center; text-decoration: none; }
  .mm-nav-btn:hover { filter: brightness(1.1); }
  .mm-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 600; color: var(--text3); font-size: .9rem; }
  .mm-legend { position: absolute; bottom: 16px; left: 12px; z-index: 500;
    background: rgba(22,24,34,.9); border: 1px solid var(--border); border-radius: 6px;
    padding: .5rem .75rem; font-size: .75rem; color: var(--text3); }
  .mm-legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: .3rem; vertical-align: middle; }
  .mm-legend div { margin: .15rem 0; }
  .mm-search { position: absolute; top: 60px; left: 12px; z-index: 500;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .6rem; }
  .mm-search input { background: var(--bg3); color: var(--text1); border: 1px solid var(--border);
    border-radius: 4px; padding: .35rem .6rem; font-size: .8rem; font-family: inherit; width: 220px; }
  .mm-search input::placeholder { color: var(--text3); }
</style>
</head>
<body>

<!-- Header -->
<header class="os-header">
  <div class="os-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="22" height="22"><path d="M12 12c-2-2.5-4-4-6-4a4 4 0 0 0 0 8c2 0 4-1.5 6-4z"/><path d="M12 12c2 2.5 4 4 6 4a4 4 0 0 0 0-8c-2 0-4 1.5-6 4z"/></svg>
    Mobius <span class="os-brand-sub">FL Behavioral Health Market</span>
  </div>
</header>

<div class="mm-wrap">
  <!-- Map fills viewport -->
  <div id="mapContainer" class="mm-map"></div>

  <!-- Loading indicator -->
  <div id="mapLoading" class="mm-loading">
    <span class="os-spinner"></span> Loading market data...
  </div>

  <!-- Search -->
  <div class="mm-search">
    <input type="text" id="orgSearch" placeholder="Search organization..." />
  </div>

  <!-- Legend -->
  <div class="mm-legend" id="mapLegend">
    <div><span class="dot" style="background:#818cf8"></span> $1M+ revenue</div>
    <div><span class="dot" style="background:#60a5fa"></span> $500K–$1M</div>
    <div><span class="dot" style="background:#34d399"></span> $100K–$500K</div>
    <div><span class="dot" style="background:#fbbf24"></span> $10K–$100K</div>
    <div><span class="dot" style="background:#94a3b8"></span> &lt;$10K</div>
    <div style="margin-top:.3rem;color:var(--text3)">Circle size = revenue</div>
  </div>

  <!-- Sidebar (appears on click) -->
  <div id="sidebar" class="mm-sidebar">
    <div class="mm-sidebar-header">
      <h3 id="sidebarTitle">Organization</h3>
      <button class="mm-close" onclick="closeSidebar()">&times;</button>
    </div>
    <div class="mm-sidebar-body" id="sidebarBody"></div>
  </div>
</div>

<script src="static/market-map.js"></script>
</body>
</html>
