[pytest]
testpaths = tests
# Day 3 gate: run with -m "not integration"
markers =
    integration: tests that need real DB, MCP, or external APIs (excluded by default gate)
    credentialing_integration: real LLM and/or provider-roster API for full report smoke (set MOBIUS_RUN_CREDENTIALING_INTEGRATION=1)
    requires_rag: tests that need CHAT_RAG_DATABASE_URL / RAG
    requires_skills: tests that need MCP or skills (e.g. Google, scraper)
