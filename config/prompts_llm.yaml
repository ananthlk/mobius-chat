    - {"type":"table","headers":["col1"],"rows":[["a","b"]]} (keep small; under 40 rows)
    - {"type":"callout","body":"short text","variant":"info"|"warning"|"tip"}
    - {"type":"detail","markdown":"markdown string","collapsed_default":true}
