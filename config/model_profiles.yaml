# Model profiles — 2026-04-24 (Sprint 2 #0, refreshed from rev43 bandit data)
#
# Pinned model choices per pipeline stage. When a profile is active,
# model_registry.select_model_for_stage() returns the pinned model
# directly, bypassing the Thompson-sampling bandit. Unpinned stages
# fall through to the bandit's normal selection.
#
# Active profile is chosen at startup via ``MOBIUS_MODEL_PROFILE`` and
# can be flipped at runtime by operators via
# ``POST /chat/admin/model-profile`` (no redeploy) — also surfaced as
# a dropdown in the chat header.
#
# ROUND of profiles (2026-04-24 refresh):
#   default / bandit  — Thompson sampling fully in charge. Baseline.
#   optimal           — Best reliability+speed+quality mix. Groq excluded
#                        (TPD throttling). Demo default.
#   gemini            — Single-provider stress test (Vertex only).
#   anthropic         — Single-provider stress test (Anthropic only).
#
# Picks were derived from the medium-confidence rows in the Thompson
# learnings window on rev43:
#   react_1: gemini-2.5-flash   (q=0.87, p95=3.0s, $0.0005)
#   react_2: gemini-2.5-flash   (q=0.63, p95=6.4s, $0.0005)
#   integrator: claude-haiku-4-5 (q=0.61, p95=3.6s, $0.003)
#   integrator_roster: gemini-2.5-pro (n=3682 production volume)
# Everything else is low-sample — we pin by provider shape + roster.
#
# Adding a new profile: append under ``profiles:``. Stage pins are
# optional — an empty map {} = "bandit active for every stage".

profiles:

  # ────────────────────────────────────────────────────────────────
  # default / bandit — Thompson sampling fully in charge.
  # ``bandit`` is an alias exposed to the frontend picker.
  # ────────────────────────────────────────────────────────────────
  default: {}
  bandit: {}

  # ────────────────────────────────────────────────────────────────
  # optimal — best reliability/speed/quality mix. Groq excluded for
  # TPD predictability. Demo default.
  # ────────────────────────────────────────────────────────────────
  optimal:
    react_1:           gemini-2.5-flash
    react_2:           gemini-2.5-flash
    react_3:           claude-haiku-4-5-20251001
    react_4:           claude-haiku-4-5-20251001
    planner:           gemini-2.5-flash
    critique:          claude-haiku-4-5-20251001
    integrator:        claude-haiku-4-5-20251001
    integrator_roster: gemini-2.5-pro
    exclude_providers: [groq]
    fallback_model:    gemini-2.5-flash

  # ────────────────────────────────────────────────────────────────
  # gemini — Vertex only. Diagnostic: isolates Gemini performance.
  # ────────────────────────────────────────────────────────────────
  gemini:
    react_1:           gemini-2.5-flash
    react_2:           gemini-2.5-flash
    react_3:           gemini-2.5-flash
    react_4:           gemini-2.5-flash
    planner:           gemini-2.5-flash
    critique:          gemini-2.5-flash
    integrator:        gemini-2.5-pro
    integrator_roster: gemini-2.5-pro
    exclude_providers: [groq, anthropic]
    fallback_model:    gemini-2.5-flash

  # ────────────────────────────────────────────────────────────────
  # anthropic — Anthropic only. Diagnostic: isolates Claude quality.
  # Costlier (Sonnet at the integrator) but a useful quality ceiling.
  # ────────────────────────────────────────────────────────────────
  anthropic:
    react_1:           claude-haiku-4-5-20251001
    react_2:           claude-haiku-4-5-20251001
    react_3:           claude-haiku-4-5-20251001
    react_4:           claude-haiku-4-5-20251001
    planner:           claude-haiku-4-5-20251001
    critique:          claude-haiku-4-5-20251001
    integrator:        claude-sonnet-4-6
    integrator_roster: claude-sonnet-4-6
    exclude_providers: [groq, vertex]
    fallback_model:    claude-haiku-4-5-20251001
